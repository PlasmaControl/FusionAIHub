# Dataset preparation configuration
# Configuration for fusion data processing pipeline

# Logging configuration
log_level: INFO

# Signal configuration - list of signals to process
# Each signal has: [signal_name, abbreviation, should_transform]
signal:
  magnetics_high_resolution:
    abbr: "mhr"
    make_stft: false
    expected_channels: 8
  ece_cali:
    abbr: "ece"
    make_stft: false
    expected_channels: 48
  co2_density:
    abbr: "co2"
    make_stft: false
    expected_channels: 4
  bes:
    abbr: "bes"
    make_stft: false
    expected_channels: 63
  

# Data processing parameters
randomize_shots: true
random_seed: 42
num_shots: 10000
fs_khz: 500  # Sampling frequency in kHz
ip_threshold: 0.1  # Plasma current threshold
window_ms: null  # Window size in milliseconds
hop_ms: null  # Hop size in milliseconds
remove_empty: true
do_stft: false
start_time: null  # Start time for signal extraction (null for auto-detection)
end_time: null    # End time for signal extraction (null for auto-detection)

# Train/test split configuration
train_test_split: 0.1

# Train/test split configuration
debug: false

# Directory paths
raw_data_dir: /scratch/gpfs/EKOLEMEN/d3d_fusion_data
output_dir: /scratch/gpfs/EKOLEMEN/hackathon/foundation25/egebench
  
# Output settings
compression: false  # Whether to compress saved files