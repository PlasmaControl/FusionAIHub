[project]
name = "faith"
version = "0.0.1-alpha"
authors = [
    { name = "Peter Steiner", email = "peter.steiner@princeton.edu" },
    { name = "Nathaniel Chen", email = "nathaniel@princeton.edu" },
    { name = "Kouroche Bouchiat", email = "bouchiat@princeton.edu" },
    { name = "Azarakhsh Jalalvand", email = "azarakhsh.jalalvand@princeton.edu" }
]
description = "Fusion Artificial InTelligence Hub - Fetch nuclear fusion data, preprocess it, train machine learning models."
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
license = { file = "LICENSE" }
dependencies = [
    "h5py",
    "scikit-learn",
    "numpy",
    "pandas",
    "matplotlib",
    "seaborn",
    "scipy",
    "tqdm",
    "paramiko",
    "ipykernel",
    "ipywidgets",
    "torch",
    "torchvision",
    "torchaudio",
    "torchmetrics",
    "lightning",
    "ray[data,train,tune,serve]",
    "tables",
    "pyyaml",
    "jupyter",
]

[dependency-groups]
dev = [
    "pytest >=8.1.1,<9",
    "pre-commit",
]

[tool.uv.sources]
torch = [
    { index = "pytorch-cpu" },
]
torchvision = [
    { index = "pytorch-cpu" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv]
package = true

[tool.ruff]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "ANN", # flake8-annotations
    ]
line-length = 79

[project.urls]
Homepage = "https://github.com"
Documentation = "https://readthedocs.org"
Repository = "https://github.com/PlasmaControl/FusionAIHub"
Issues = "https://github.com/PlasmaControl/FusionAIHub/issues"
Changelog = "https://github.com"
