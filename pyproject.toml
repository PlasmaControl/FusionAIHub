[project]
name = "fusion_ai_hub"
version = "0.0.1"
authors = [
    {name="Peter Steiner", email="peter.steiner@princeton.edu"},
    {name="Max Tian Curie", email="max.curie@princeton.edu"},
    {name="Azarakhsh Jalalvand", email="azarakhsh.jalalvand@princeton.edu"}
]
description = "FusionAIHub - Fetch nuclear fusion data, preprocess it, and use it for training machine learning models."
readme = "README.md"
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
license = {file = "LICENSE"}
dependencies = [
    "h5py", "numpy", "pandas", "matplotlib", "scipy", "tqdm", "opencv-python"
]

[project.urls]
Homepage = "https://github.com"
Documentation = "https://readthedocs.org"
Repository = "https://github.com/PlasmaControl/FusionAIHub"
Issues = "https://github.com/PlasmaControl/FusionAIHub/issues"
Changelog = "https://github.com"

